<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mauricio v5.1</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: sans-serif; 
            background: #121b22; 
            color: #fff; 
            padding: 15px; 
            margin: 0; 
            min-height: 100vh;
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 0; 
            margin-bottom: 20px; 
        }
        .logo { 
            font-size: 20px; 
            color: #2563EB; 
            font-weight: bold; 
        }
        .btn-menu { 
            background: #2a3942; 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
        }
        
        #menu-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            right: 0; 
            width: 50%; 
            height: 100%; 
            background: rgba(11, 20, 26, 0.95); 
            z-index: 100; 
            padding: 20px; 
            padding-bottom: 80px;
            box-sizing: border-box; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            border-left: 1px solid #3b4a54;
        }
        .menu-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }
        .menu-title { 
            font-size: 20px; 
            font-weight: bold; 
            color: #2563EB; 
        }
        
        textarea { 
            width: 100%; 
            height: 150px; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
            background: #2a3942; 
            color: #fff; 
            border: 1px solid #3b4a54; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 18px; 
            resize: none; 
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            margin-bottom: 30px;
        }
        .control-item { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            font-size: 14px; 
        }
        
        select, input[type="text"] { 
            padding: 12px; 
            background: #2a3942; 
            color: white; 
            border: 2px solid #556677; 
            border-radius: 8px; 
            font-size: 14px; 
            width: 100%; 
        }
        
        input[type="color"] { 
            background: #2a3942; 
            border: 2px solid #556677; 
            border-radius: 8px; 
            height: 48px; 
            width: 100%; 
            cursor: pointer; 
        }
        
        button.btn-accion { 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 16px; 
            margin-bottom: 12px; 
        }
        .btn-limpiar { background: #ef4444; color: #fff; }
        .btn-compartir { background: #25D366; color: #111; display: none; }
        #btnFS { background: #3b4a54; color: white; margin-bottom: 20px; }
        .btn-guardar { 
            background: #2563EB; 
            color: white; 
            margin-top: 15px; 
            margin-bottom: 30px;
        }
        
        #contenedor-preview { 
            text-align: center; 
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
        }
        #preview { 
            max-width: 100%; 
            border-radius: 10px; 
            display: none; 
            box-shadow: 0px 5px 15px rgba(0,0,0,0.6); 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Mauricio v5.1</div>
        <button class="btn-menu" onclick="toggleMenu()">⋮</button>
    </div>

    <div id="menu-overlay">
        <div class="menu-header">
            <span class="menu-title">Configuración</span>
            <button class="btn-menu" onclick="toggleMenu()">✕</button>
        </div>
        
        <button id="btnFS" class="btn-accion" onclick="toggleFullScreen()">Pantalla Completa</button>

        <div class="control-item">
            <label>Firma</label>
            <input type="text" id="customSignature" placeholder="Mauricio v5.1">
        </div>

        <div class="grid">
            <div class="control-item">
                <label>Color del texto</label>
                <input type="color" id="color" value="#00FF00">
            </div>
            <div class="control-item">
                <label>Grosor</label>
                <select id="grosor">
                    <option value="300">Fino</option>
                    <option value="400">Normal</option>
                    <option value="700" selected>Negrita</option>
                </select>
            </div>
            <div class="control-item">
                <label>Alineación</label>
                <select id="alineacion">
                    <option value="left">Izquierda</option>
                    <option value="center">Centro</option>
                    <option value="right">Derecha</option>
                </select>
            </div>
            <div class="control-item">
                <label>Fondo</label>
                <select id="fondo">
                    <option value="oscuro">Oscuro (Negro)</option>
                    <option value="blanco">Blanco</option>
                </select>
            </div>
            <div class="control-item">
                <label>Fuente</label>
                <select id="fuente">
                    <option value="sans-serif" selected>Normal</option>
                    <option value="monospace">Mono</option>
                </select>
            </div>
            <div class="control-item">
                <label>Tamaño</label>
                <select id="tamano">
                    <option value="28">Chico</option>
                    <option value="36" selected>Mediano</option>
                    <option value="46">Grande</option>
                </select>
            </div>
        </div>
        <button class="btn-accion btn-guardar" onclick="toggleMenu()">Listo</button>
    </div>

    <textarea id="texto" placeholder="Escribe tu texto aquí..."></textarea>
    <button class="btn-accion btn-limpiar" onclick="limpiarTodo()">Limpiar</button>
    
    <div id="contenedor-preview">
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="preview" alt="Vista previa" />
        <button id="btnCompartir" class="btn-accion btn-compartir" onclick="compartirWhatsApp()">Enviar / Descargar</button>
    </div>

    <script>
        function toggleMenu() { 
            const m = document.getElementById('menu-overlay'); 
            m.style.display = (m.style.display === 'block') ? 'none' : 'block'; 
        }

        function toggleFullScreen() {
            const btn = document.getElementById('btnFS');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                btn.style.background = "#2563EB";
                btn.innerText = "Pantalla Completa (Activada)";
            } else {
                document.exitFullscreen();
                btn.style.background = "#3b4a54";
                btn.innerText = "Pantalla Completa";
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('btnFS');
            if (!document.fullscreenElement) {
                btn.style.background = "#3b4a54";
                btn.innerText = "Pantalla Completa";
            }
        });

        function generarImagen() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const texto = document.getElementById('texto').value;
            const preview = document.getElementById('preview');
            const btnCompartir = document.getElementById('btnCompartir');

            if (!texto.trim()) { 
                preview.style.display = 'none'; 
                btnCompartir.style.display = 'none'; 
                return; 
            }

            ctx.textBaseline = 'top'; 
            const color = document.getElementById('color').value;
            const fondo = document.getElementById('fondo').value;
            const alineacion = document.getElementById('alineacion').value;
            const fuente = document.getElementById('fuente').value;
            const grosor = document.getElementById('grosor').value;
            const tamano = parseInt(document.getElementById('tamano').value);
            const firma = document.getElementById('customSignature').value || "Mauricio v5.1";
            
            const margenSeguridad = 25;
            const margenLados = 40 + margenSeguridad;
            const espacioEntreRayaTexto = 18;
            const anchoRaya = 6;
            const margenArriba = 35 + margenSeguridad;
            const margenAbajo = 55 + margenSeguridad;
            const maxWidth = 560;

            ctx.font = `${grosor} ${tamano}px ${fuente}`;
            const parrafos = texto.split('\n');
            let lineas = [];
            parrafos.forEach(p => {
                let palabras = p.split(' ');
                let linea = (palabras[0] || "").trim();
                for(let i=1; i<palabras.length; i++) {
                    if(ctx.measureText(linea + " " + palabras[i]).width < maxWidth) {
                        linea += " " + palabras[i];
                    } else { 
                        lineas.push(linea); 
                        linea = palabras[i].trim(); 
                    }
                }
                if(linea) lineas.push(linea);
            });

            const espacioEntreLineas = tamano * 1.4;
            const alturaTexto = lineas.length * espacioEntreLineas;
            const alturaTotal = margenArriba + alturaTexto + margenAbajo;

            canvas.width = maxWidth + (margenLados * 2);
            canvas.height = alturaTotal;

            // Solo los dos fondos claros y fijos
            if (fondo === 'oscuro') { 
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height); 
            } else {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            const inicioY = margenArriba;

            const r = parseInt(color.slice(1,3),16);
            const g = parseInt(color.slice(3,5),16);
            const b = parseInt(color.slice(5,7),16);
            
            ctx.fillStyle = fondo === 'blanco' ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.6)';
            ctx.font = "15px sans-serif";
            ctx.fillText(firma, margenLados, alturaTotal - 18);

            ctx.fillStyle = color;
            const posXRaya = margenLados - espacioEntreRayaTexto - anchoRaya;
            ctx.fillRect(posXRaya, inicioY, anchoRaya, alturaTexto);

            ctx.fillStyle = color;
            ctx.font = `${grosor} ${tamano}px ${fuente}`;
            lineas.forEach((linea, i) => {
                let x = margenLados;
                if(alineacion === 'center') {
                    x = canvas.width/2 - ctx.measureText(linea).width/2;
                }
                if(alineacion === 'right') {
                    x = canvas.width - margenLados - ctx.measureText(linea).width;
                }
                ctx.fillText(linea, x, inicioY + (i * espacioEntreLineas));
            });

            preview.src = canvas.toDataURL('image/png');
            preview.style.display = 'inline-block';
            btnCompartir.style.display = 'block';
        }

        const controles = ['texto', 'color', 'alineacion', 'fondo', 'fuente', 'grosor', 'tamano', 'customSignature'];
        controles.forEach(id => {
            const el = document.getElementById(id);
            const val = localStorage.getItem('wa_' + id);
            if(val) el.value = val.replace(/[<>]/g, "");
            el.addEventListener('input', () => { 
                try { localStorage.setItem('wa_' + id, el.value); } catch(e){}
                generarImagen(); 
            });
        });

        function compartirWhatsApp() {
            const canvas = document.getElementById('canvas');
            
            canvas.toBlob(function(blob) {
                if (!blob) {
                    alert("Error al generar la imagen");
                    return;
                }

                const archivo = new File([blob], "mensaje.png", { type: "image/png" });

                if (navigator.share && navigator.canShare({ files: [archivo] })) {
                    navigator.share({
                        title: "Mensaje",
                        files: [archivo]
                    }).catch(() => descargarImagen(blob));
                } else {
                    descargarImagen(blob);
                }

            }, 'image/png', 1.0);
        }

        function descargarImagen(blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "mensaje.png";
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert("✅ Imagen guardada. Ahora ve a WhatsApp y adjúntala");
        }

        function limpiarTodo() { 
            document.getElementById('texto').value = ''; 
            localStorage.setItem('wa_texto', ''); 
            generarImagen(); 
        }

        window.onload = generarImagen;
    </script>
</body>
</html>
